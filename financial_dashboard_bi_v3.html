<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial BI Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #e0e0e0;
    }
    
    .container {
      max-width: 1800px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 30px;
    }
    
    .header h1 {
      font-size: 42px;
      font-weight: 300;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #fff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .control-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .control-group label {
      color: #a0a0a0;
      font-weight: 500;
      font-size: 14px;
    }
    
    select {
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      font-size: 14px;
      background: rgba(255,255,255,0.05);
      color: #000;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 120px;
    }
    
    select:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
    }
    
    select:focus {
      outline: none;
      border-color: #0099ff;
      box-shadow: 0 0 0 3px rgba(0,153,255,0.1);
    }
    
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    
    .chart-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }
    
    .chart-card:hover {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
    }
    
    .chart-card.full-width {
      grid-column: 1 / -1;
    }
    
    .chart-card.with-table {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .chart-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .chart-container {
      position: relative;
      height: 320px;
    }
    
    .table-container {
      overflow-x: auto;
    }
    
    .expense-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .expense-table th {
      background: rgba(0,153,255,0.1);
      color: #fff;
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .expense-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #e0e0e0;
    }
    
    .expense-table tr:hover {
      background: rgba(0,153,255,0.05);
    }
    
    .expense-table .category {
      color: #0099ff;
      font-weight: 500;
    }
    
    .expense-table .amount {
      text-align: right;
      color: #00d084;
      font-weight: 500;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
    }
    
    .error {
      background: rgba(220,50,50,0.2);
      color: #ff6b6b;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #ff6b6b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Financial Analytics Dashboard</h1>
    <div class="controls">
      <div class="control-group">
        <label for="yearSelect">Year:</label>
        <select id="yearSelect" onchange="loadDashboard()">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="control-group">
        <label for="monthSelect">Month:</label>
        <select id="monthSelect" onchange="loadDashboard()">
          <option value="">Loading...</option>
        </select>
      </div>
    </div>
  </div>
  
  <div id="loading" class="loading">Loading dashboard...</div>
  
  <div id="dashboard" style="display: none;">
    <div class="charts-grid">
      <!-- Income Trend -->
      <div class="chart-card">
        <div class="chart-title">Income Trend (6 Months)</div>
        <div class="chart-container">
          <canvas id="incomeChart"></canvas>
        </div>
      </div>
      
      <!-- Expenses Trend (Stacked 100%) -->
      <div class="chart-card">
        <div class="chart-title">Expenses Trend (6 Months)</div>
        <div class="chart-container">
          <canvas id="expensesChart"></canvas>
        </div>
      </div>
      
      <!-- Discretionary Trend (12 Months) -->
      <div class="chart-card full-width">
        <div class="chart-title">Discretionary Income (12 Months)</div>
        <div class="chart-container" style="height: 280px;">
          <canvas id="discretionaryChart"></canvas>
        </div>
      </div>
      
      <!-- Expense Categories Pie + QOL Table -->
      <div class="chart-card with-table">
        <div>
          <div class="chart-title">Expense Categories</div>
          <div class="chart-container">
            <canvas id="expensePieChart"></canvas>
          </div>
        </div>
        <div>
          <div class="chart-title">QOL Items Breakdown</div>
          <div class="table-container">
            <table class="expense-table">
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Monthly Cost</th>
                </tr>
              </thead>
              <tbody id="qolTableBody">
                <tr>
                  <td colspan="2" style="text-align: center; color: #999;">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8rRt3HrE8dTtdBb4I51oPR7iU2lPE1Y68BeejJPi9CYBEgEeCzjHo6IbkNitBdp3S/exec';

let allData = null;
let currentYear = null;
let currentMonth = null;
let charts = {};

const colors = {
  salary: '#0099ff',
  rentals: '#00d084',
  dividends: '#9d4edd',
  ff: '#ff006e',
  marriage: '#ffd60a',
  food: '#ffc300',
  subs: '#00b4d8',
  qol: '#90e0ef',
  installments: '#ef476f'
};

function formatCurrency(value) {
  if (!value || isNaN(value)) return '฿0';
  return '฿' + Math.round(value).toLocaleString('en-US');
}

function parseMonth(monthStr) {
  if (!monthStr) return 'Loading...';
  const parts = monthStr.toString().split('-');
  if (parts.length === 2) {
    const year = parseInt(parts[0]);
    const month = parseInt(parts[1]);
    const date = new Date(year, month - 1);
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
  }
  return monthStr;
}

function getMonthNumber(monthStr) {
  const date = new Date(monthStr + '-01');
  return date.getMonth();
}

function get6MonthRange(selectedMonth) {
  if (!allData || !selectedMonth) return [];
  
  const selectedDate = new Date(selectedMonth + '-01');
  const year = selectedDate.getFullYear();
  const month = selectedDate.getMonth();
  
  const range = [];
  for (let i = -5; i <= 0; i++) {
    const d = new Date(year, month + i, 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const key = `${y}-${m}`;
    if (allData.financialData[key]) {
      range.push(key);
    }
  }
  
  return range;
}

function get12MonthRange() {
  if (!allData) return [];
  
  // Get last 12 months from all available data
  const sorted = allData.months.slice().reverse();
  return sorted.slice(0, 12).reverse();
}

function renderIncomeChart(monthRange) {
  const salaries = monthRange.map(m => parseFloat(allData.financialData[m]['Salary']) || 0);
  const rentals = monthRange.map(m => parseFloat(allData.financialData[m]['Rentals']) || 0);
  const dividends = monthRange.map(m => parseFloat(allData.financialData[m]['Dividends']) || 0);
  
  const ctx = document.getElementById('incomeChart').getContext('2d');
  if (charts.income) charts.income.destroy();
  
  charts.income = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: monthRange.map(parseMonth),
      datasets: [
        { label: 'Salary', data: salaries, backgroundColor: colors.salary, borderRadius: 4 },
        { label: 'Rentals', data: rentals, backgroundColor: colors.rentals, borderRadius: 4 },
        { label: 'Dividends', data: dividends, backgroundColor: colors.dividends, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#fff' } },
        tooltip: {
          callbacks: { label: (ctx) => formatCurrency(ctx.parsed.y) },
          backgroundColor: 'rgba(0,0,0,0.7)'
        }
      },
      scales: {
        x: { ticks: { color: '#fff' } },
        y: { ticks: { callback: (v) => '฿' + (v / 1000).toFixed(0) + 'k', color: '#999' } }
      }
    }
  });
}

function renderExpensesChart(monthRange) {
  const datasets = [
    { label: 'FF', key: 'FF_Total', color: colors.ff },
    { label: 'Marriage', key: 'Marriage_Exp', color: colors.marriage },
    { label: 'Food', key: 'Food_Budget', color: colors.food },
    { label: 'Subs', key: 'Subs_Total', color: colors.subs },
    { label: 'QOL', key: 'QOL_Total', color: colors.qol },
    { label: 'Installments', key: 'Other_Total', color: colors.installments }
  ];
  
  const ctx = document.getElementById('expensesChart').getContext('2d');
  if (charts.expenses) charts.expenses.destroy();
  
  charts.expenses = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: monthRange.map(parseMonth),
      datasets: datasets.map(ds => ({
        label: ds.label,
        data: monthRange.map(m => parseFloat(allData.financialData[m][ds.key]) || 0),
        backgroundColor: ds.color,
        borderRadius: 4
      }))
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      stacked: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#fff' } },
        tooltip: {
          callbacks: { label: (ctx) => formatCurrency(ctx.parsed.x) },
          backgroundColor: 'rgba(0,0,0,0.7)'
        }
      },
      scales: {
        x: { ticks: { callback: (v) => '฿' + (v / 1000).toFixed(0) + 'k', color: '#999' } }
      }
    }
  });
}

function renderDiscretionaryChart(monthRange) {
  const discretionary = monthRange.map(m => {
    const data = allData.financialData[m];
    return (parseFloat(data['Total_Income']) || 0) - (parseFloat(data['Total_Fixed_Costs']) || 0);
  });
  
  const ctx = document.getElementById('discretionaryChart').getContext('2d');
  if (charts.discretionary) charts.discretionary.destroy();
  
  charts.discretionary = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: monthRange.map(parseMonth),
      datasets: [{
        label: 'Discretionary Income',
        data: discretionary,
        backgroundColor: '#00d084',
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: (ctx) => formatCurrency(ctx.parsed.y) },
          backgroundColor: 'rgba(0,0,0,0.7)'
        }
      },
      scales: {
        x: { ticks: { color: '#fff' } },
        y: { ticks: { callback: (v) => '฿' + (v / 1000).toFixed(0) + 'k', color: '#999' } }
      }
    }
  });
}

function renderExpensePieChart(monthData) {
  const categories = {
    'FF': 30000,
    'Marriage': parseFloat(monthData['Marriage_Exp']) || 0,
    'Food': parseFloat(monthData['Food_Budget']) || 0,
    'Subs': parseFloat(monthData['Subs_Total']) || 0,
    'QOL': parseFloat(monthData['QOL_Total']) || 0,
    'Installments': parseFloat(monthData['Other_Total']) || 0
  };
  
  const ctx = document.getElementById('expensePieChart').getContext('2d');
  if (charts.pie) charts.pie.destroy();
  
  charts.pie = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(categories),
      datasets: [{
        data: Object.values(categories),
        backgroundColor: [colors.ff, colors.marriage, colors.food, colors.subs, colors.qol, colors.installments],
        borderColor: 'rgba(15, 23, 42, 0.8)',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#fff' } },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const value = ctx.parsed;
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = ((value / total) * 100).toFixed(1);
              return `${ctx.label}: ${formatCurrency(value)} (${pct}%)`;
            }
          },
          backgroundColor: 'rgba(0,0,0,0.7)'
        }
      }
    }
  });
}

function renderQOLTable(monthData) {
  const qolMonth = currentMonth;
  const qolItems = (allData.qolItems[qolMonth] || []);
  
  // Sum by category
  const categorySums = {};
  qolItems.forEach(item => {
    const cat = item.category || 'Other';
    categorySums[cat] = (categorySums[cat] || 0) + (parseFloat(item.cost) || 0);
  });
  
  // Sort by amount descending
  const sorted = Object.entries(categorySums).sort((a, b) => b[1] - a[1]);
  
  const tbody = document.getElementById('qolTableBody');
  tbody.innerHTML = sorted.map(([cat, amount]) => `
    <tr>
      <td class="category">${cat}</td>
      <td class="amount">${formatCurrency(amount)}</td>
    </tr>
  `).join('');
}

function loadDashboard() {
  const yearSelect = document.getElementById('yearSelect');
  const monthSelect = document.getElementById('monthSelect');
  
  currentYear = yearSelect.value;
  currentMonth = monthSelect.value;
  
  if (!allData || !currentMonth) return;
  
  const monthData = allData.financialData[currentMonth];
  if (!monthData) return;
  
  // Get 6-month range for trends
  const monthRange6 = get6MonthRange(currentMonth);
  const monthRange12 = get12MonthRange();
  
  renderIncomeChart(monthRange6);
  renderExpensesChart(monthRange6);
  renderDiscretionaryChart(monthRange12);
  renderExpensePieChart(monthData);
  renderQOLTable(monthData);
}

window.addEventListener('load', () => {
  fetch(APPS_SCRIPT_URL)
    .then(response => response.json())
    .then(data => {
      allData = data;
      
      // Build year options
      const years = new Set();
      data.months.forEach(m => {
        const y = parseInt(m.split('-')[0]);
        years.add(y);
      });
      
      const yearSelect = document.getElementById('yearSelect');
      yearSelect.innerHTML = '';
      Array.from(years).sort().reverse().forEach(year => {
        const opt = document.createElement('option');
        opt.value = year.toString();
        opt.textContent = year;
        yearSelect.appendChild(opt);
      });
      
      // On year change, update month options
      yearSelect.onchange = () => {
        const selectedYear = parseInt(yearSelect.value);
        const monthSelect = document.getElementById('monthSelect');
        monthSelect.innerHTML = '';
        
        data.months
          .filter(m => parseInt(m.split('-')[0]) === selectedYear)
          .sort()
          .reverse()
          .forEach(month => {
            const opt = document.createElement('option');
            opt.value = month;
            opt.textContent = parseMonth(month);
            monthSelect.appendChild(opt);
          });
        
        if (monthSelect.options.length > 0) {
          monthSelect.value = monthSelect.options[0].value;
          loadDashboard();
        }
      };
      
      // Trigger initial load
      if (yearSelect.options.length > 0) {
        yearSelect.value = yearSelect.options[0].value;
        yearSelect.dispatchEvent(new Event('change'));
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      }
    })
    .catch(error => {
      console.error('Error:', error);
      document.getElementById('loading').innerHTML = `<div class="error">Error loading dashboard: ${error.message}</div>`;
    });
});
</script>
</body>
</html>
